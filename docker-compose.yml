services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./static:/app/static
      - ./backend/automation.db:/app/automation.db
      - ./backend/key.json:/app/key.json
      - ./Logo.png:/app/Logo.png
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    # Added explicit command to bind to all interfaces
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    # Production Mode for stability
    command: sh -c "npm install && npm run build && npm run start"
    restart: always
    depends_on:
      - backend
