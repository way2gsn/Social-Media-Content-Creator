services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./static:/app/static
      - ./backend/automation.db:/app/automation.db
      - ./backend/key.json:/app/key.json
    restart: always
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    restart: always
    depends_on:
      - backend
