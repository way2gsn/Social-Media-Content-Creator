<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Martel:wght@400;700;900&display=swap');
        
        :root {
            --canvas-width: 1080px;
            --canvas-height: {{ view_height }}px;
            
            /* Professional Heritage Palette */
            {% if heritage_mode == 'light' %}
            --bg-image: url('data:image/png;base64,{{ light_bg_base64 }}');
            --primary: #d91d1d;
            --text-main: #000000;
            --panel-bg: rgba(255, 255, 255, 0.98);
            --shadow-soft: 0 4px 15px rgba(255,255,255,0.8);
            {% else %}
            --bg-image: url('data:image/png;base64,{{ dark_bg_base64 }}');
            --primary: #ff9933;
            --text-main: #ffffff;
            --panel-bg: rgba(0, 0, 0, 0.9);
            --shadow-soft: 0 10px 40px rgba(0,0,0,0.5);
            {% endif %}
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { 
            width: var(--canvas-width); 
            height: var(--canvas-height); 
            overflow: hidden; 
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            font-family: 'Martel', serif;
            color: var(--text-main);
            position: relative;
        }

        /* Front-facing Character Layer */
        .character-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 10;
            pointer-events: none;
        }

        .character-img {
            max-width: 160%;
            max-height: 95%;
            filter: drop-shadow(0 20px 60px rgba(0,0,0,0.4));
        }

        /* Poster Content Architecture */
        .poster-box {
            position: relative;
            z-index: 30;
            width: 100%;
            height: 100%;
            padding: 100px 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-meta {
            margin-top: 20px;
        }

        .exclusive-pill {
            font-family: 'Anton', sans-serif;
            font-size: 14px;
            letter-spacing: 6px;
            color: white;
            background: var(--primary);
            padding: 12px 30px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .headline {
            font-family: 'Martel', serif;
            font-size: 76px;
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -3px;
            text-transform: uppercase;
            color: var(--text-main);
            max-width: 1000px;
            text-shadow: var(--text-shadow);
        }

        /* Insight Feature Panel */
        .points-panel {
            background: var(--panel-bg);
            padding: 50px;
            border-left: 15px solid var(--primary);
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .point-row {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
        }
        .point-row:last-child { margin-bottom: 0; }

        .point-idx {
            font-family: 'Anton', sans-serif;
            font-size: 30px;
            color: var(--primary);
            opacity: 0.8;
        }

        .point-body {
            font-size: 26px;
            font-weight: 700;
            line-height: 1.4;
        }

        /* Branding Strip */
        .brand-strip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            background: var(--primary);
            padding: 18px 60px;
            border-radius: 100px;
            width: fit-content;
            margin: 0 auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .brand-logo { width: 55px; height: 55px; border-radius: 50%; border: 3px solid white; }
        .brand-name { font-family: 'Anton', sans-serif; font-size: 20px; letter-spacing: 6px; color: white; text-transform: uppercase; }

    </style>
</head>
<body>
    <div class="character-container">
        {% if cutout_base64 %}
            <img src="data:image/png;base64,{{ cutout_base64 }}" class="character-img" alt="Character">
        {% else %}
            <img src="{{ original_image }}" class="character-img" style="opacity: 0.1; filter: grayscale(1);" alt="Original">
        {% endif %}
    </div>

    <div class="poster-box">
        <div class="top-meta">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <span class="exclusive-pill" style="margin-bottom: 0;">EXCLUSIVE FEATURE</span>
                {% if source_domain %}
                <span class="exclusive-pill" style="margin-bottom: 0; background: #22c55e; border: 2px solid rgba(255,255,255,0.5);">VERIFIED: {{ source_domain }}</span>
                {% endif %}
            </div>
            <h1 class="headline">{{ headline }}</h1>
        </div>
        
        <div class="bottom-data">
            <div class="points-panel">
                {% for point in points %}
                <div class="point-row">
                    <span class="point-idx">0{{ loop.index }}</span>
                    <p class="point-body">{{ point }}</p>
                </div>
                {% endfor %}
            </div>

            <div class="brand-strip">
                {% if logo_base64 %}
                    <img src="data:image/png;base64,{{ logo_base64 }}" class="brand-logo" alt="Logo">
                {% endif %}
                <span class="brand-name">Humorously Indians</span>
            </div>
        </div>
    </div>
</body>
</html>
