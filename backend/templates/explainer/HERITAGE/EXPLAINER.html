<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&family=Inter:wght@400;700;800&display=swap');
        
        :root {
            --canvas-width: {{ width }}px;
            --canvas-height: {{ height }}px;
            
            /* Professional Heritage Palette */
            {% if heritage_mode == 'light' %}
            --bg-image: url('data:image/png;base64,{{ light_bg_base64 }}');
            --accent: #b91c1c;
            --text-main: #020617;
            --text-muted: #64748b;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --panel-border: rgba(0, 0, 0, 0.05);
            --text-shadow: 0 4px 12px rgba(255,255,255,0.8);
            {% else %}
            --bg-image: url('data:image/png;base64,{{ dark_bg_base64 }}');
            --accent: #f59e0b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --panel-bg: rgba(15, 23, 42, 0.9);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-shadow: 0 10px 40px rgba(0,0,0,0.6);
            {% endif %}
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { 
            width: var(--canvas-width); 
            height: var(--canvas-height); 
            overflow: hidden; 
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            position: relative;
        }

        /* Pure Character Layer - Ensuring Face Visibility */
        .character-layer {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 10;
            pointer-events: none;
        }

        .character-img {
            max-width: 160%; /* Allowing it to be large and prominent */
            max-height: 90%;
            filter: drop-shadow(0 20px 80px rgba(0,0,0,0.4));
            object-fit: contain;
        }

        /* Editorial Container - Layered behind or around character but readable */
        .content-master {
            position: absolute;
            inset: 0;
            padding: 80px;
            z-index: 30; /* Front of character */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Spreading content to keep center clear */
        }

        .editorial-header {
            margin-top: 40px;
        }

        .category-tag {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 25px;
        }

        .headline {
            font-family: 'Outfit', sans-serif;
            font-size: 82px;
            font-weight: 900;
            line-height: 1.0;
            letter-spacing: -3px;
            text-transform: uppercase;
            color: var(--text-main);
            max-width: 900px;
            text-shadow: var(--text-shadow);
        }

        /* Clean Points Panel */
        .insight-box {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 40px;
            padding: 55px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        .point-item {
            display: flex;
            gap: 30px;
            margin-bottom: 35px;
        }
        .point-item:last-child { margin-bottom: 0; }

        .point-num {
            font-family: 'Outfit', sans-serif;
            font-size: 38px;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
        }

        .point-txt {
            font-size: 24px;
            line-height: 1.45;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Clean Branding */
        .branding-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0;
        }

        .brand-pill {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--accent);
            padding: 12px 30px;
            border-radius: 100px;
            color: #fff;
        }

        .logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; }
        .brand-name { font-weight: 900; text-transform: uppercase; font-size: 16px; letter-spacing: 2px; }

        .issue-date {
            font-size: 13px;
            font-weight: 800;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>
    <div class="character-layer">
        {% if cutout_base64 %}
            <img src="data:image/png;base64,{{ cutout_base64 }}" class="character-img" alt="Character">
        {% else %}
            <img src="{{ original_image }}" class="character-img" style="opacity: 0.1; filter: grayscale(1);" alt="Original">
        {% endif %}
    </div>

    <div class="content-master">
        <div class="editorial-header">
            <div class="category-tag">Insight Report</div>
            <h1 class="headline">{{ headline }}</h1>
        </div>
        
        <div class="editorial-body">
            <div class="insight-box">
                {% for point in points %}
                <div class="point-item">
                    <span class="point-num">0{{ loop.index }}</span>
                    <p class="point-txt">{{ point }}</p>
                </div>
                {% endfor %}
            </div>

            <div class="branding-row">
                <div class="brand-pill">
                    {% if logo_base64 %}
                    <img src="data:image/png;base64,{{ logo_base64 }}" class="logo">
                    {% endif %}
                    <div class="brand-name">Humorously Indians</div>
                </div>
                <div class="issue-date">Heritage Editorial</div>
            </div>
        </div>
    </div>
</body>
</html>
