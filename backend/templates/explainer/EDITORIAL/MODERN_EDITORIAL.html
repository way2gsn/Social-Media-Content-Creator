<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&family=Syne:wght@800&display=swap');
        
        :root {
            --accent: #991b1b;
            --bg: #050505;
            --text: #ffffff;
            --grid: rgba(153, 27, 27, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 1080px;
            height: {{ view_height }}px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 1. Split Layout Base */
        .layout-grid {
            display: grid;
            grid-template-columns: 480px 1fr;
            height: 100%;
            position: relative;
            z-index: 10;
        }

        .left-col {
            border-right: 1px solid rgba(153, 27, 27, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 80px 40px;
        }

        .right-col {
            padding: 100px 100px 100px 80px; /* Increased padding */
            display: flex;
            flex-direction: column;
            background: linear-gradient(to right, rgba(0,0,0,0.5), transparent);
        }

        /* 2. Character Area */
        .char-container {
            position: absolute;
            inset: 0;
            z-index: 5;
        }

        .character-cutout {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.1) brightness(0.9) drop-shadow(0 0 50px rgba(0,0,0,1));
        }

        /* 3. Typography & Content */
        .vertical-headline {
            position: absolute;
            top: 150px;
            left: -200px;
            transform: rotate(-90deg);
            transform-origin: center center;
            width: 1000px;
            font-family: 'Anton', sans-serif;
            font-size: 140px;
            line-height: 0.8;
            text-transform: uppercase;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
            white-space: nowrap;
            letter-spacing: -2px;
            z-index: 2;
        }

        .category-stripe {
            background: var(--accent);
            color: white;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            align-self: flex-start;
            margin-bottom: 50px;
        }

        .main-title {
            font-family: 'Anton', sans-serif;
            font-size: 72px; /* Reduced from 90px */
            line-height: 0.95;
            text-transform: uppercase;
            margin-bottom: 60px;
            letter-spacing: -1.5px;
            color: white;
            text-shadow: 10px 10px 0px rgba(153,27,27,0.4);
        }

        .points-list {
            display: flex;
            flex-direction: column;
            gap: 40px; /* Reduced gap for more vertical space */
        }

        .point-item {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .point-num {
            font-family: 'Anton', sans-serif;
            font-size: 40px;
            color: var(--accent);
            opacity: 0.5;
            line-height: 1;
            margin-top: -5px;
        }

        .point-text {
            font-size: 26px;
            line-height: 1.4;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
        }

        /* 4. Branding & Meta */
        .header-meta {
            position: absolute;
            top: 60px;
            left: 60px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--accent);
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            object-fit: cover;
        }

        .index-tag {
            font-family: 'Anton', sans-serif;
            font-size: 20px;
            letter-spacing: 4px;
            color: var(--accent);
            transform: translateY(2px);
        }

        .footer {
            position: absolute;
            top: 50%;
            right: 40px;
            transform: translateY(-50%) rotate(90deg); /* Vertical Side Ribbon */
            transform-origin: center right;
            z-index: 20;
            white-space: nowrap;
        }

        .brand-label {
            font-family: 'Anton', sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: var(--accent);
            opacity: 0.7;
        }

        /* Atmospheric */
        .geometry-overlay {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(var(--grid) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="header-meta">
        {% if logo_base64 %}
        <img src="data:image/png;base64,{{ logo_base64 }}" class="brand-logo">
        {% endif %}
        <div class="index-tag">EDITORIAL // {{ slide_index }}</div>
    </div>

    <div class="geometry-overlay"></div>

    <div class="char-container">
        {% if cutout_base64 %}
        <img src="data:image/png;base64,{{ cutout_base64 }}" class="character-cutout">
        {% endif %}
    </div>

    <div class="layout-grid">
        <div class="left-col">
            <div class="vertical-headline">{{ character_name }}</div>
        </div>
        <div class="right-col">
            <div class="category-stripe">FEATURE</div>
            <h1 class="main-title">{{ headline }}</h1>
            
            <div class="points-list">
                {% for point in points %}
                <div class="point-item">
                    <div class="point-num">0{{ loop.index }}</div>
                    <div class="point-text">{{ point }}</div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="brand-label">Humorously Indians</div>
    </div>
</body>
</html>
