<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --accent: #e11d48; /* Red for Insight tag */
            --bg: #111111; /* Changed to dark for premium fallback */
            --text: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 1080px;
            height: {{ view_height }}px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 1. Full Screen Hero Image */
        .hero-background {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* 2. White Gradient Overlay (Bottom to Top) */
        .bottom-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(to top, 
                rgba(255,255,255,1) 0%, 
                rgba(255,255,255,0.9) 30%, 
                transparent 100%);
            z-index: 2;
        }

        /* 3. Content Area - Moved up for better balance */
        .content-container {
            position: absolute;
            bottom: 120px; /* Elevated from bottom */
            left: 80px;
            right: 80px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .insight-tag {
            background: var(--accent);
            color: white;
            padding: 6px 16px;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .source-label {
            color: var(--accent);
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .source-label::before {
            content: "•";
            font-size: 24px;
        }

        .headline {
            font-weight: 900;
            font-size: 68px;
            line-height: 1.0;
            text-transform: uppercase;
            color: #111;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .description {
            font-size: 28px;
            line-height: 1.3;
            font-weight: 600;
            color: #333;
            max-width: 90%;
        }

        /* 4. Branding Header (Moved from bottom) */
        .header-row {
            position: absolute;
            top: 80px; /* Professional top margin */
            left: 80px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 3;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            color: #000;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        .brand-handle {
            font-weight: 700;
            font-size: 18px;
            color: var(--accent);
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

    </style>
</head>
<body>
    <!-- Full screen image -->
    <img src="{{ image_url }}" class="hero-background">

    <!-- Gradient -->
    <div class="bottom-gradient"></div>

    <!-- Header Branding -->
    <div class="header-row">
        {% if logo_base64 %}
        <img src="data:image/png;base64,{{ logo_base64 }}" class="brand-logo">
        {% endif %}
        <div class="brand-text">
            <span class="brand-name">HUMOROUSLY INDIANS</span>
            <span class="brand-handle">@humorously_indians</span>
        </div>
    </div>

    <!-- Content Area -->
    <div class="content-container">
        <div class="meta-row">
            <div class="insight-tag">INSIGHT</div>
            <div class="source-label">VERIFIED SOURCE</div>
        </div>

        <h1 class="headline">{{ headline }}</h1>
        
        <p class="description">{{ subtitle }}</p>
    </div>

</body>
</html>
