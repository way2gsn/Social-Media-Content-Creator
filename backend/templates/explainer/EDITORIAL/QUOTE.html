<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');
        
        :root {
            --accent: #d97706; /* Amber/rusty accent */
            --bg: #1a1a1a;
        }

        .theme-TECH { --accent: #d97706; }
        .theme-CULTURE { --accent: #b45309; }
        .theme-CRIME { --accent: #92400e; }
        .theme-POLITICS { --accent: #c2410c; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 1080px;
            height: {{ view_height }}px;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 1. Background Logic & Rusty Overlay */
        .background-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(to bottom, #111, #000);
        }
        .bg-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* No cropping as requested */
            filter: brightness(0.9) contrast(1.1);
            opacity: 1.0;
        }

        /* Noise Texture for Premium Rusty Look */
        .texture-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0.4;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* 2. Hero Character */
        .character-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }
        .character-cutout {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: bottom center;
            /* Black and White Filter + Contrast for Premium Look */
            filter: grayscale(100%) contrast(120%) brightness(0.9) drop-shadow(-20px 20px 50px rgba(0,0,0,1));
        }

        /* 3. Text Overlay */
        .quote-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            padding: 120px 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background: linear-gradient(to right, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
        }

        .quote-mark {
            font-family: 'Playfair Display', serif;
            font-size: 350px;
            color: var(--accent);
            line-height: 0.1;
            margin-bottom: 80px;
            margin-left: -20px;
            opacity: 0.9;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
            max-width: 650px;
            text-shadow: 0 10px 40px rgba(0,0,0,1);
            margin-bottom: 50px;
            letter-spacing: -1px;
        }

        .headline span {
            color: var(--accent);
            font-style: italic;
        }

        .attribution {
            margin-top: auto;
            margin-bottom: 40px;
            border-left: 6px solid var(--accent);
            padding-left: 30px;
        }
        .author-name {
            font-weight: 900;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
        }
        .author-title {
            font-size: 16px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 8px;
            font-weight: 700;
        }

        /* 4. Brand & Logo */
        .brand-header {
            position: absolute;
            top: 60px;
            right: 80px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            background: #fff;
            border: 2px solid var(--accent);
        }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }

        .brand-text {
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: right;
            color: #aaa;
        }
        .brand-text span { color: var(--accent); }
        
    </style>
</head>
<body class="theme-{{ theme }}">
    <div class="background-layer">
        {% if original_image %}
        <img src="{{ original_image }}" class="bg-img">
        {% endif %}
    </div>

    <svg class="texture-overlay" xmlns="http://www.w3.org/2000/svg">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
    </svg>

    <div class="character-container">
        {% if cutout_image %}
        <img src="data:image/png;base64,{{ cutout_image }}" class="character-cutout">
        {% endif %}
    </div>

    <div class="quote-overlay">
        <div class="brand-header">
            <div class="brand-text">HUMOROUSLY<br><span>INDIANS</span></div>
            <div class="logo-circle">
                {% if logo_base64 %}
                <img src="data:image/png;base64,{{ logo_base64 }}" class="logo-img">
                {% endif %}
            </div>
        </div>

        <div class="quote-mark">“</div>
        <h1 class="headline">{{ headline }}</h1>
        
        <div class="attribution">
            <div class="author-name">{{ character_name }}</div>
        </div>
    </div>
</body>
</html>
