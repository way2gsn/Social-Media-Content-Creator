<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&family=Inter:ital,wght@0,400;0,700;0,800;1,800&display=swap');
        
        :root {
            --canvas-width: 1080px;
            --canvas-height: 1350px;
            
            /* Theme overrides (V4.1 Hook) */
            {% if theme == 'HERITAGE' %}
                {% if heritage_mode == 'light' %}
                    --bg: #fcfdfe;
                    --accent: #b91c1c;
                    --text: #020617;
                    --heritage-bg: url('data:image/png;base64,{{ light_bg_base64 }}');
                {% else %}
                    --bg: #020617;
                    --accent: #f59e0b;
                    --text: #ffffff;
                    --heritage-bg: url('data:image/png;base64,{{ dark_bg_base64 }}');
                {% endif %}
            {% else %}
                --bg: #000;
                --accent: #ff0000;
                --text: #fff;
                --heritage-bg: none;
            {% endif %}
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { 
            width: var(--canvas-width); 
            height: var(--canvas-height); 
            overflow: hidden; 
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .heritage-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--heritage-bg);
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: 1;
        }

        .main-content {
            position: relative;
            z-index: 10;
            padding: 80px;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hook-label {
            display: inline-block;
            background: var(--accent);
            color: {% if theme == 'HERITAGE' and heritage_mode == 'dark' %}#000{% else %}#fff{% endif %};
            padding: 12px 30px;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .headline {
            font-family: 'Outfit', sans-serif;
            font-size: 100px; /* Massive Hook */
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -6px;
            text-transform: uppercase;
            margin-bottom: 60px;
            font-style: italic;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        /* Hero Image - Centerpiece with Glow */
        .visual-anchor {
            width: 100%;
            height: 400px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 40px 0;
        }

        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--accent);
            filter: blur(100px);
            opacity: 0.3;
            z-index: 1;
        }

        .anchor-img {
            max-width: 90%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 60px;
            z-index: 10;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5));
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            z-index: 20;
        }

        .swipe-cta {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 16px;
            color: var(--accent);
            animation: bounce 2s infinite;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(0);}
            40% {transform: translateX(15px);}
            60% {transform: translateX(8px);}
        }

        .logo { height: 44px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }

    </style>
</head>
<body>
    <div class="heritage-overlay"></div>
    
    <div class="main-content">
        <div class="hook-label">Major Story Alert</div>
        <h1 class="headline">{{ headline }}</h1>
        
        {% if image_url %}
        <div class="visual-anchor">
            <div class="glow"></div>
            <img src="{{ image_url }}" class="anchor-img">
        </div>
        {% endif %}
    </div>

    <div class="footer">
        <div class="swipe-cta">Analysis Starts Here →</div>
        <img src="data:image/png;base64,{{ logo_base64 }}" class="logo">
    </div>
</body>
</html>
