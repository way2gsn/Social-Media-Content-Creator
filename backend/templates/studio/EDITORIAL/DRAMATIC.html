<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');
        
        :root {
            --accent: #e11d48;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { 
            width: {{ width }}px; 
            height: {{ height }}px; 
            overflow: hidden; 
            background: #000;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            position: relative;
        }

        /* Full-Bleed AI Image — two-layer: blurred bg + sharp foreground */
        .hero {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(40px) brightness(0.4);
            transform: scale(1.1);
        }
        .hero-img {
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 25%;
            filter: brightness(0.9) contrast(1.1);
            z-index: 2;
        }

        /* Cinematic Bottom Gradient */
        .gradient-scrim {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 40%, transparent 100%);
            z-index: 5;
        }

        /* Top Gradient for logo visibility */
        .gradient-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 25%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
            z-index: 5;
        }

        /* Brand / Logo */
        .brand-bar {
            position: absolute;
            top: 40px;
            left: 50px;
            right: 50px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            background: #fff;
        }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }
        .brand-name {
            font-weight: 900;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.8);
        }
        .brand-name span { color: var(--accent); }

        /* Content at Bottom */
        .content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 0 60px 70px 60px;
        }

        .category-pill {
            display: inline-flex;
            align-items: center;
            background: rgba(225, 29, 72, 0.2);
            border: 1px solid rgba(225, 29, 72, 0.4);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 900;
            line-height: 1.0;
            letter-spacing: -1px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.8);
            max-width: 95%;
        }

        .subtitle-bar {
            margin-top: 25px;
            padding: 20px 0;
            border-top: 4px solid rgba(255,255,255,0.2);
            font-size: 28px;
            font-weight: 400;
            color: rgba(255,255,255,0.9);
            line-height: 1.5;
            font-style: italic;
            max-width: 85%;
        }

    </style>
</head>
<body>
    <div class="hero">
        {% if image_url %}
        <img src="{{ image_url }}" class="hero-bg">
        <img src="{{ image_url }}" class="hero-img">
        {% endif %}
    </div>

    <div class="gradient-top"></div>
    <div class="gradient-scrim"></div>

    <div class="brand-bar">
        <div class="brand-name">Humorously <span>Indians</span></div>
        <div class="logo-circle">
            {% if logo_base64 %}
            <img src="data:image/png;base64,{{ logo_base64 }}" class="logo-img">
            {% endif %}
        </div>
    </div>

    <div class="content">
        <h1 class="headline">{{ headline }}</h1>
        <div class="subtitle-bar">{{ subtitle }}</div>
    </div>

</body>
</html>
