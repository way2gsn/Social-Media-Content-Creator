<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');
        
        :root {
            --canvas-width: {{ width }}px;
            --canvas-height: {{ height }}px;
            --accent: #e11d48;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { 
            width: var(--canvas-width); 
            height: var(--canvas-height); 
            overflow: hidden; 
            background: #000;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            position: relative;
        }

        /* Full-Bleed Hero Image */
        .hero {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8);
        }

        /* Cinematic Bottom Gradient */
        .gradient-scrim {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 40%, transparent 100%);
            z-index: 5;
        }

        /* Top Gradient for logo visibility */
        .gradient-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 25%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
            z-index: 5;
        }

        /* Brand / Logo */
        .brand-bar {
            position: absolute;
            top: 50px;
            left: 60px;
            right: 60px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand-name {
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .brand-name span { color: var(--accent); }
        
        .logo-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            background: #fff;
        }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }

        /* Content at Bottom */
        .content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 0 70px 80px 70px;
        }

        .category-pill {
            display: inline-flex;
            align-items: center;
            background: rgba(225, 29, 72, 0.2);
            border: 1px solid rgba(225, 29, 72, 0.4);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 76px;
            font-weight: 900;
            line-height: 1.0;
            letter-spacing: -1px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.8);
            max-width: 95%;
            margin-bottom: 25px;
        }

        .subtitle {
            font-size: 32px;
            font-weight: 400;
            color: rgba(255,255,255,0.9);
            line-height: 1.4;
            font-style: italic;
            max-width: 90%;
            border-left: 6px solid var(--accent);
            padding-left: 25px;
        }

    </style>
</head>
<body>
    <div class="hero">
        {% if image_url %}
        <img src="{{ image_url }}" class="hero-img">
        {% endif %}
    </div>

    <div class="gradient-top"></div>
    <div class="gradient-scrim"></div>

    <div class="brand-bar">
        <div class="brand-name">Humorously <span>Indians</span></div>
        <div class="logo-circle">
            {% if logo_base64 %}
            <img src="data:image/png;base64,{{ logo_base64 }}" class="logo-img">
            {% endif %}
        </div>
    </div>

    <div class="content">
        <h1 class="headline">{{ headline }}</h1>
        <p class="subtitle">{{ subtitle }}</p>
    </div>

</body>
</html>
