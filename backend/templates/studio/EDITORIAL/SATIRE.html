<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Playfair+Display:wght@900&family=Space+Grotesk:wght@300;700&display=swap');
        
        :root {
            --canvas-width: {{ width }}px;
            --canvas-height: {{ height }}px;
            --accent: #ef4444; /* Bright Red */
            --bg: #000000;
            --text: #ffffff;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { 
            width: var(--canvas-width); 
            height: var(--canvas-height); 
            overflow: hidden; 
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* Top Bar - Classified Memo Style */
        .header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .classified {
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 12px;
            border: 1px solid var(--accent);
            padding: 4px 12px;
        }
        .memo-id { font-size: 12px; color: #666; font-family: monospace; }

        .hero {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }
        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.5) contrast(1.2) brightness(0.7);
        }
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.8) 100%);
        }

        .content {
            padding: 60px 50px 100px 50px;
            text-align: left;
            background: linear-gradient(to top, #000 80%, transparent);
            margin-top: -150px;
            z-index: 10;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 84px;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -2px;
            margin-bottom: 40px;
            color: #fff;
            text-transform: uppercase;
        }

        .spin-box {
            display: inline-block;
            background: rgba(239, 68, 68, 0.1);
            border-left: 5px solid var(--accent);
            padding: 20px 30px;
            backdrop-filter: blur(5px);
        }

        .subtext {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer {
            padding: 40px 50px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand { font-weight: 900; text-transform: uppercase; font-size: 16px; letter-spacing: 2px; }
        .brand span { color: var(--accent); }
        .handle { color: #444; font-size: 14px; font-weight: 500; }

    </style>
</head>
<body>
    <div class="header">
        <div class="classified">Classified Narrative Memo</div>
        <div class="memo-id">REF: IND-{{ datetime.now().strftime('%Y') }}-SPIN</div>
    </div>

    <div class="hero">
        {% if image_url %}
        <img src="{{ image_url }}" class="hero-img">
        {% else %}
        <img src="https://loremflickr.com/1080/1080/india,politics" class="hero-img">
        {% endif %}
    </div>

    <div class="content">
        <h1 class="headline">{{ headline }}</h1>
        <div class="spin-box">
            <div class="subtext">{{ subtext | safe }}</div>
        </div>
    </div>

    <div class="footer">
        <div class="brand">Humorously Indians<span>.</span></div>
        <div class="handle">@humorously_indians</div>
    </div>
</body>
</html>
