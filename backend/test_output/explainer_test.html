<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Space+Grotesk:wght@300;700&display=swap');
        
        :root {
            /* Default: POLITICS (Red) */
            --accent: #e11d48; 
            --accent-glow: rgba(225, 29, 72, 0.3);
            --bg: #020617;
            --text: #f8fafc;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* Theme Overrides */
        .theme-TECH {
            --accent: #06b6d4; /* Cyan */
            --accent-glow: rgba(6, 182, 212, 0.3);
            --bg: #080a0f;
        }
        .theme-CULTURE {
            --accent: #f59e0b; /* Gold/Amber */
            --accent-glow: rgba(245, 158, 11, 0.3);
            --bg: #0c0a09;
        }
        .theme-CRIME {
            --accent: #991b1b; /* Deep Red */
            --accent-glow: rgba(153, 27, 27, 0.3);
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 1080px;
            height: 1350px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 1. Cinematic Background */
        .spotlight {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 40%, var(--accent-glow) 0%, transparent 70%);
            z-index: 1;
        }

        .grain {
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.05;
            z-index: 2;
        }

        /* 2. Character Cutout (Massive presence) */
        .character-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding-left: 0;
        }

        .character-cutout {
            height: 95%;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 50px rgba(0,0,0,0.8));
            z-index: 10;
        }

        /* 3. Typography Layers (Headline behind character) */
        .headline-bg {
            position: absolute;
            top: 150px;
            left: 50px;
            right: 50px;
            z-index: 4; /* Behind character */
            font-family: 'Playfair Display', serif;
            font-size: 140px;
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -4px;
            text-transform: uppercase;
            opacity: 0.15;
            color: var(--accent);
        }

        .content-overlay {
            position: absolute;
            inset: 0;
            z-index: 15; /* In front of everything */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 80px 60px;
        }

        .category-line {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); }
        .category { font-weight: 900; text-transform: uppercase; font-size: 16px; letter-spacing: 4px; color: var(--accent); }

        .headline-main {
            font-family: 'Playfair Display', serif;
            font-size: 82px;
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -1px;
            max-width: 800px;
            margin-bottom: 60px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 4. Points Panel (Floating Glassmorphism) */
        .points-panel {
            position: absolute;
            bottom: 100px;
            right: 60px;
            width: 550px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-left: 6px solid var(--accent);
            padding: 50px;
            border-radius: 4px 20px 20px 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            z-index: 20;
        }

        .point-item {
            display: flex;
            gap: 25px;
            margin-bottom: 35px;
        }
        .point-item:last-child { margin-bottom: 0; }

        .point-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            opacity: 0.8;
        }

        .point-text {
            font-size: 22px;
            line-height: 1.4;
            color: #e2e8f0;
            font-weight: 500;
        }

        /* Branding */
        .masthead {
            position: absolute;
            top: 80px;
            right: 60px;
            text-align: right;
            z-index: 100;
        }
        .brand { font-weight: 900; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .brand span { color: var(--accent); }
        
    </style>
</head>
